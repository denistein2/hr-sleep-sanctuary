version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "react-router*"
          - "react-helmet-async"
      dev-tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript*"
          - "vite*"
          - "@vitejs/*"
          - "vitest"
    ignore:
      # Atualizações major requerem revisão manual
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - ci
